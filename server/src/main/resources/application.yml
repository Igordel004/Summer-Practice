server:
  port: 8080

spring:
  application:
    name: messenger-server
  datasource:
    url: jdbc:postgresql://localhost:5432/messenger_db
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

jwt:
  secret: ${JWT_SECRET:my-very-secret-key-for-jwt-signing-hmac-sha-256}
  expiration-ms: 86400000

websocket:
  port: 8081
  max-connections: 500

sms:
  api-id: 4A718BBE-CAC4-61CE-CF82-360BF058950E
  api-url: https://sms.ru/sms/send
  sender: SMS

soap:
  namespace: http://ritg.ru/messengerserver
  level:
    ru.ritg.messengerserver: DEBUG
    org.springframework.ws: DEBUG
