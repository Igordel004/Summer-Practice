server:
  port: 8080

spring:
  application:
    name: gs-message-server
  datasource:
    url: jdbc:postgresql://localhost:5432/gs_message_db
    username: gs_user
    password: gs_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:/db/migration/Init_schema.sql

jwt:
  secret: ${JWT_SECRET:my-very-secret-key-for-jwt-signing-hmac-sha-256}
  expiration-ms: 86400000

websocket:
  port: 8081
  max-connections: 500

soap:
  namespace: http://ritg.ru/gsmessage
  level:
    ru.ritg.gsmessage: DEBUG
    org.springframework.ws: DEBUG
